<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>バス会社営業所マップ</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --accent:    #4f7cff;

      --c-signed:  #34d399;
      --c-talk:    #fbbf24;
      --c-none:    #94a3b8;
      --c-stop:    #f87171;

      --sidebar-w: 320px;
      --header-h:  56px;
    }

    html, body { height: 100%; font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Header ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 1000;
    }
    header h1 { font-size: 15px; font-weight: 700; letter-spacing: .04em; white-space: nowrap; }
    header h1 span { color: var(--accent); }

    .header-search {
      flex: 1; max-width: 360px;
      position: relative;
    }
    .header-search input {
      width: 100%; padding: 7px 12px 7px 34px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px; outline: none;
      transition: border-color .2s;
    }
    .header-search input:focus { border-color: var(--accent); }
    .header-search .icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; pointer-events: none;
    }

    .filter-group { display: flex; gap: 8px; margin-left: auto; }
    .filter-btn {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid transparent; cursor: pointer; transition: all .2s;
      background: var(--bg);
    }
    .filter-btn[data-status="all"]      { border-color: var(--muted);    color: var(--muted); }
    .filter-btn[data-status="契約済"]   { border-color: var(--c-signed); color: var(--c-signed); }
    .filter-btn[data-status="商談中"]   { border-color: var(--c-talk);   color: var(--c-talk); }
    .filter-btn[data-status="未接触"]   { border-color: var(--c-none);   color: var(--c-none); }
    .filter-btn[data-status="取引停止"] { border-color: var(--c-stop);   color: var(--c-stop); }
    .filter-btn.active, .filter-btn:hover { opacity: 1; }
    .filter-btn[data-status="all"].active      { background: var(--muted);    color: #fff; border-color: var(--muted); }
    .filter-btn[data-status="契約済"].active   { background: var(--c-signed); color: #fff; }
    .filter-btn[data-status="商談中"].active   { background: var(--c-talk);   color: #fff; }
    .filter-btn[data-status="未接触"].active   { background: var(--c-none);   color: #fff; }
    .filter-btn[data-status="取引停止"].active { background: var(--c-stop);   color: #fff; }

    /* ── Layout ── */
    .app {
      display: flex; height: 100vh;
      padding-top: var(--header-h);
    }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      color: var(--muted); text-transform: uppercase;
      display: flex; justify-content: space-between; align-items: center;
    }
    .count-badge {
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
    }
    .list { flex: 1; overflow-y: auto; }
    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-item {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .15s;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .list-item:hover { background: rgba(79,124,255,.08); }
    .list-item.active { background: rgba(79,124,255,.14); }

    .dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .dot.契約済   { background: var(--c-signed); }
    .dot.商談中   { background: var(--c-talk); }
    .dot.未接触   { background: var(--c-none); }
    .dot.取引停止 { background: var(--c-stop); }

    .item-info { min-width: 0; }
    .item-company { font-size: 11px; color: var(--muted); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-name    { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-addr    { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
      color: var(--text) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 0 !important; width: 280px !important; }

    .popup-inner { padding: 16px; }
    .popup-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 10px; margin-bottom: 10px;
    }
    .popup-status.契約済   { background: rgba(52,211,153,.15); color: var(--c-signed); }
    .popup-status.商談中   { background: rgba(251,191,36,.15);  color: var(--c-talk); }
    .popup-status.未接触   { background: rgba(148,163,184,.15); color: var(--c-none); }
    .popup-status.取引停止 { background: rgba(248,113,113,.15); color: var(--c-stop); }

    .popup-company { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .popup-name    { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .popup-addr    { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

    .popup-links { display: flex; gap: 8px; margin-bottom: 12px; }
    .popup-link {
      flex: 1; padding: 7px 10px; border-radius: 8px; text-align: center;
      font-size: 12px; font-weight: 600; text-decoration: none;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); transition: border-color .2s, color .2s;
    }
    .popup-link:hover { border-color: var(--accent); color: var(--accent); }
    .popup-link.disabled { opacity: .35; pointer-events: none; }

    .popup-memo {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 12px; line-height: 1.6; color: var(--muted);
    }
    .popup-memo-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 16px; transition: opacity .4s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--muted); }

    /* ── Empty state ── */
    .empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── Custom marker ── */
    .marker-pin {
      width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg); border: 2px solid rgba(255,255,255,.25);
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>データを読み込み中...</p>
</div>

<!-- Header -->
<header>
  <h1>🚌 <span>バス会社</span>営業所マップ</h1>
  <div class="header-search">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="会社名・営業所名で検索..." />
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-status="all">すべて</button>
    <button class="filter-btn" data-status="契約済">契約済</button>
    <button class="filter-btn" data-status="商談中">商談中</button>
    <button class="filter-btn" data-status="未接触">未接触</button>
    <button class="filter-btn" data-status="取引停止">取引停止</button>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside>
    <div class="sidebar-header">
      営業所一覧
      <span class="count-badge" id="count">0</span>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <!-- Map -->
  <div id="map"></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNfwk5Vi5pcZ-kDIuPZjkxKoWB2do89G56LUQDWm_2YIPlOoEV_kD7q-dGQjmB4jQ4Fg0KTSNI9acQ/pub?gid=0&single=true&output=csv';

const STATUS_COLOR = {
  '契約済':   '#34d399',
  '商談中':   '#fbbf24',
  '未接触':   '#94a3b8',
  '取引停止': '#f87171',
};

// ── Map init ─────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([36.5, 136.0], 6);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── State ────────────────────────────────────────────────────────────────
let allData     = [];
let markers     = {};   // id → L.marker
let activeFilter = 'all';
let activeSearch = '';
let activeId    = null;

// ── Marker factory ───────────────────────────────────────────────────────
function makeIcon(status) {
  const color = STATUS_COLOR[status] || '#94a3b8';
  return L.divIcon({
    className: '',
    html: `<div class="marker-pin" style="background:${color}"></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -30],
  });
}

// ── Popup HTML ───────────────────────────────────────────────────────────
function popupHTML(row) {
  const siteLink = row['公式サイト']
    ? `<a class="popup-link" href="${row['公式サイト']}" target="_blank" rel="noopener">🌐 公式サイト</a>`
    : `<span class="popup-link disabled">🌐 公式サイト</span>`;

  const recruitLink = row['採用ページ']
    ? `<a class="popup-link" href="${row['採用ページ']}" target="_blank" rel="noopener">📋 採用ページ</a>`
    : `<span class="popup-link disabled">📋 採用ページ</span>`;

  const memo = row['メモ']
    ? `<div class="popup-memo"><div class="popup-memo-label">メモ</div>${row['メモ']}</div>`
    : '';

  const addr = [row['郵便番号'] ? '〒' + row['郵便番号'] : '', row['住所']].filter(Boolean).join(' ');

  return `
    <div class="popup-inner">
      <div class="popup-status ${row['契約状態']}">
        <span>●</span>${row['契約状態'] || '未設定'}
      </div>
      <div class="popup-company">${row['会社名'] || ''}</div>
      <div class="popup-name">${row['営業所名'] || '（名称不明）'}</div>
      <div class="popup-addr">${addr}</div>
      <div class="popup-links">${siteLink}${recruitLink}</div>
      ${memo}
    </div>`;
}

// ── Render ───────────────────────────────────────────────────────────────
function filtered() {
  return allData.filter(row => {
    const matchStatus = activeFilter === 'all' || row['契約状態'] === activeFilter;
    const q = activeSearch.toLowerCase();
    const matchSearch = !q ||
      (row['会社名'] || '').toLowerCase().includes(q) ||
      (row['営業所名'] || '').toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });
}

function render() {
  const rows = filtered();

  // Update count
  document.getElementById('count').textContent = rows.length;

  // Sidebar list
  const list = document.getElementById('list');
  if (rows.length === 0) {
    list.innerHTML = '<div class="empty">該当する営業所がありません</div>';
  } else {
    list.innerHTML = rows.map(row => `
      <div class="list-item ${row._id === activeId ? 'active' : ''}" data-id="${row._id}">
        <div class="dot ${row['契約状態']}"></div>
        <div class="item-info">
          <div class="item-company">${row['会社名'] || ''}</div>
          <div class="item-name">${row['営業所名'] || '（名称不明）'}</div>
          <div class="item-addr">${row['住所'] || ''}</div>
        </div>
      </div>`).join('');

    list.querySelectorAll('.list-item').forEach(el => {
      el.addEventListener('click', () => focusMarker(el.dataset.id));
    });
  }

  // Markers: hide all, show filtered
  Object.entries(markers).forEach(([id, m]) => {
    const row = allData.find(r => r._id === id);
    const visible = rows.some(r => r._id === id);
    if (visible) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
}

function focusMarker(id) {
  activeId = id;
  const marker = markers[id];
  if (!marker) return;
  map.setView(marker.getLatLng(), 14, { animate: true });
  marker.openPopup();
  render();

  // Scroll sidebar item into view
  const el = document.querySelector(`.list-item[data-id="${id}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Load CSV ─────────────────────────────────────────────────────────────
Papa.parse(CSV_URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete({ data }) {
    allData = data.map((row, i) => ({ ...row, _id: row['ID'] || String(i) }));

    allData.forEach(row => {
      const lat = parseFloat(row['緯度']);
      const lng = parseFloat(row['経度']);
      if (isNaN(lat) || isNaN(lng)) return;

      const marker = L.marker([lat, lng], { icon: makeIcon(row['契約状態']) })
        .bindPopup(popupHTML(row), { maxWidth: 300 });

      marker.on('click', () => {
        activeId = row._id;
        render();
        const el = document.querySelector(`.list-item[data-id="${row._id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      marker.addTo(map);
      markers[row._id] = marker;
    });

    render();
    document.getElementById('loading').classList.add('hide');
  },
  error(err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#f87171">データの読み込みに失敗しました<br>${err.message}</p>`;
  }
});

// ── Filter buttons ────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.status;
    render();
  });
});

// ── Search ───────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  activeSearch = e.target.value.trim();
  render();
});
</script>
</body>
</html>
